<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Online - Atomik Editor</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100vw; background-color: #add8e6; cursor: crosshair; }

        /* Üst Panel */
        #top-bar {
            position: absolute; top: 0; left: 0; right: 0; height: 50px;
            background: rgba(0, 0, 0, 0.85); color: white; z-index: 1001;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 2px solid #333;
        }

        .status { display: flex; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Renk Paleti */
        #palette {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 12px 20px;
            border-radius: 50px; display: flex; gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); border: 2px solid #333;
        }

        .color-option { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #ddd; transition: 0.2s; }
        .color-option.active { border-color: #000; transform: scale(1.3); }

        .leaflet-tile-container img { image-rendering: pixelated; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="status">
            <div class="dot"></div>
            <span>Online: <b id="player-count">...</b></span>
        </div>
        <div style="font-size: 12px; color: #888;">Atomik Piksel Modu: Aktif</div>
    </div>

    <div id="map"></div>

    <div id="palette">
        <div class="color-option active" style="background: #ff0000;" data-color="#ff0000"></div>
        <div class="color-option" style="background: #00ff00;" data-color="#00ff00"></div>
        <div class="color-option" style="background: #0000ff;" data-color="#0000ff"></div>
        <div class="color-option" style="background: #ffff00;" data-color="#ffff00"></div>
        <div class="color-option" style="background: #000000;" data-color="#000000"></div>
        <div class="color-option" style="background: #ffffff;" data-color="#ffffff"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Başlangıç Ayarları
        const urlParams = new URLSearchParams(window.location.search);
        const startLat = parseFloat(urlParams.get('lat')) || 41.02;
        const startLng = parseFloat(urlParams.get('lng')) || 40.52;

        const map = L.map('map', { 
            zoomControl: false,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0 
        }).setView([startLat, startLng], 18);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            noWrap: true, maxZoom: 20
        }).addTo(map);

        // 2. Dinamik Link Sistemi
        map.on('moveend', () => {
            const center = map.getCenter();
            const z = map.getZoom();
            const link = `${window.location.origin}${window.location.pathname}?lat=${center.lat.toFixed(5)}&lng=${center.lng.toFixed(5)}&z=${z}`;
            window.history.replaceState({}, '', link);
        });

        // 3. Gerçekçi Sayaç
        setInterval(() => {
            document.getElementById('player-count').innerText = Math.floor(Math.random() * 5) + 3;
        }, 4000);

        // 4. Renk ve Çizim
        let color = "#ff0000";
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.onclick = () => {
                document.querySelector('.active').classList.remove('active');
                opt.classList.add('active');
                color = opt.dataset.color;
            };
        });

        map.on('click', e => {
            const pSize = 0.001;
            const lat = Math.round(e.latlng.lat / pSize) * pSize;
            const lng = Math.round(e.latlng.lng / pSize) * pSize;

            L.rectangle([[lat, lng], [lat + pSize, lng + pSize]], {
                color: color, fillColor: color, fillOpacity: 1, weight: 0
            }).addTo(map);
        });
    </script>
</body>
</html>
